---
# ============================================================================
# Debian / Ubuntu (apt) package-name map. Loaded when ansible_os_family ==
# "Debian" (covers the crostini, xubuntu, and ubuntu_laptop profiles).
# ============================================================================
deb_arch: amd64

base_packages:
  - build-essential
  - curl
  - wget
  - git
  - unzip
  - zip
  - gnupg
  - lsb-release
  - ca-certificates
  - software-properties-common
  - apt-transport-https
  - python3-debian        # required by the deb822_repository module
  - man-db
  - less
  - openssh-client
  - dnsutils
  - net-tools
  - traceroute
  - nmap
  - whois
  - htop
  - ncdu
  - nano
  - nfs-common

python_packages:
  - python3
  - python3-pip
  - python3-venv
  - python3-full

# CLI tools whose package name differs from the binary name on Debian.
pkg_bat: bat
pkg_fd: fd-find
pkg_ripgrep: ripgrep
pkg_shellcheck: shellcheck
pkg_pipx: pipx
bat_command: batcat        # Debian ships bat as `batcat`
fd_command: fdfind         # Debian ships fd as `fdfind`

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-compose-plugin
