---
# Chromebook Crostini (Debian container) — Docker CLI only (no daemon), no
# systemd-managed services. NOTE: Crostini's sudo quirks and ~/.local/bin
# install paths are only partially handled in this release; xubuntu and
# ubuntu_laptop are the fully-supported Debian targets for now.
docker_install: true
docker_daemon: false           # CLI only — no daemon inside the container
docker_apt_repo_url: "https://download.docker.com/linux/debian"
install_vscode: true
install_claude_code: true
clone_repos: false

enable_xrdp: false
enable_tlp: false

base_extra_packages: []
base_services: []
