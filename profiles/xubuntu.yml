---
# Xubuntu 24.04 on a Proxmox VM — full Docker Engine, SSH server.
docker_install: true
docker_daemon: true
docker_apt_repo_url: "https://download.docker.com/linux/ubuntu"
install_vscode: true
install_claude_code: true
clone_repos: false

# Consumed by the power role (follow-up PR).
enable_tlp: false

base_extra_packages:
  - openssh-server
  - qemu-guest-agent
base_services:
  - ssh
  - qemu-guest-agent
