---
# Bare-metal Ubuntu laptop — full Docker Engine, TLP power management.
docker_install: true
docker_daemon: true
docker_apt_repo_url: "https://download.docker.com/linux/ubuntu"
install_vscode: true
install_claude_code: true
clone_repos: false

enable_tlp: true               # power role: TLP + ThinkPad charge thresholds + fwupd

base_extra_packages:
  - openssh-server
base_services:
  - ssh
