# ============================================================================
# ShellCheck — static analysis of bootstrap.sh (the one surviving shell shim).
# Thin wrapper around lentago/shared-workflows/shellcheck.yml. No `scripts`
# input → discovers all *.sh files in the repo.
# ============================================================================
name: ShellCheck

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  shellcheck:
    uses: lentago/shared-workflows/.github/workflows/shellcheck.yml@main
