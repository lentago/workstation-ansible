# ============================================================================
# Claude Code — Automated PR Review
# ============================================================================
# Thin wrapper around lentago/shared-workflows/claude-review.yml. Pinned to Haiku.
# ============================================================================

name: Claude Code Review

# DISABLED 2026-06-25: automated Claude PR review turned off fleet-wide.
# Trigger is manual workflow_dispatch only, so it never auto-runs on PRs. The
# repo-specific review_prompt below is preserved; to re-enable, restore the
# `on: pull_request` trigger (see fleet history).
on:
  workflow_dispatch:

jobs:
  claude-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: lentago/shared-workflows/.github/workflows/claude-review.yml@main
    secrets: inherit
    with:
      review_prompt: |
        This repository is lentago/workstation-ansible — an Ansible rebuild of
        the workstation-bootstrap shell scripts. It provisions a cloud-infra dev
        workstation across four profiles (crostini, xubuntu, fedora,
        ubuntu_laptop) using role-based tasks, a profile/feature-toggle model,
        and per-OS-family package maps. Focus your review on:

        - **Idempotency**: every task must be safe to re-run. Flag missing
          `creates:` guards, missing `changed_when`/`failed_when` on
          command/shell tasks, and modules driven in non-idempotent ways.
        - **Privilege model**: system installs use `become: true`; user-space
          steps (nvm, .bashrc, Starship, VS Code settings) must run as the user.
          Flag become misuse and root-vs-user `$HOME`/`ansible_env.HOME` mix-ups.
        - **Profile / variable correctness**: feature toggles (docker_install,
          docker_daemon, enable_tlp, …) and the vars/<os_family>.yml package
          maps must be applied consistently; flag a role hard-coding what a
          profile should drive.
        - **Security**: no secrets committed; GH_TOKEN only via the environment;
          apt repos pinned with signed-by keyrings; piped installers used with
          care.
        - **Cross-profile parity**: a change to one platform's behavior should
          be reflected for the others, adapted per package manager — the repo's
          "keep the four profiles in sync" rule.
