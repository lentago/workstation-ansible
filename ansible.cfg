# ============================================================================
# Lentago Labs — workstation-ansible
# Self-provisioning config: the play runs against localhost, mostly in user
# context with per-task privilege escalation (sudo) for system installs.
# ============================================================================
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
stdout_callback = yaml
nocows = True
interpreter_python = auto_silent
retry_files_enabled = False
deprecation_warnings = True

[privilege_escalation]
become = False
become_method = sudo
become_ask_pass = False
